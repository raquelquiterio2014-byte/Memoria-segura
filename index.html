<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel do Sistema</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- MENU LATERAL -->
    <aside class="sidebar">
        <h2>👥 Sistema de Apoio</h2>
        <ul>
            <li>Usuários</li>
            <li>Medicamentos</li>
            <li>Rotina</li>
            <li>Ocorrências</li>
            <li>Alertas</li>
            <li>Relatório Diário</li>
            <li>Painel do Cuidador</li>
            <li>Painel do Idoso</li>
            <li>Comunicação</li>
        </ul>
    </aside>

    <!-- DASHBOARD -->
    <main class="dashboard">

        <div class="card">
            <h3>💊 Medicamentos</h3>
            <p id="medicamentos"></p>
        </div>

        <div class="card">
            <h3>📅 Rotina de Hoje</h3>
            <p id="rotina"></p>
        </div>

        <div class="card">
            <h3>⚠️ Ocorrências</h3>
            <p id="ocorrencias"></p>
        </div>

        <div class="card">
            <h3>🔔 Alertas</h3>
            <p id="alertas"></p>
        </div>

        <div class="card">
            <h3>💬 Comunicação</h3>
            <p id="mensagens"></p>
        </div>

        <div class="card">
            <h3>📄 Relatório Diário</h3>
            <p id="relatorio"></p>
        </div>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
